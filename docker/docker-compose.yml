services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server
    profiles: ["full", "server"]
    # Upstream ghcr.io/ggml-org/llama.cpp:server* images ship llama-server and
    # its .so files together in /app/ but don't put /app on the linker search
    # path, so the binary errors out with "libllama-common.so.0: cannot open
    # shared object file". This propagates to the cuda/vulkan overrides via
    # docker compose's environment merge.
    environment:
      - LD_LIBRARY_PATH=/app
    # Base command — always replaced by docker/docker-compose.override.yml generated by install.sh.
    # MODEL_NAME and CTX_SIZE must be set (or use: openmono install).
    command: >
      --model /models/${MODEL_NAME:-}
      --alias ${MODEL_ALIAS:-model}
      --host 0.0.0.0
      --port 7474
      --ctx-size ${CTX_SIZE:-196608}
      --threads 8
      --threads-batch 8
      --batch-size 2048
      --ubatch-size 1024
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --parallel 1
      --jinja
      --reasoning off
      --metrics
      --api-key ${LLAMA_API_KEY:-}
    volumes:
      - ../models:/models:ro
    ports:
      - "${LLAMA_PORT:-7474}:7474"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  agent:
    image: openmono-agent:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: openmono-agent
    profiles: ["full", "agent"]
    volumes:
      - ${WORKSPACE:-.}:/workspace
      - ${HOME}/.openmono:/home/agent/.openmono
      - ${HOME}/.code-review-graph:/home/agent/.code-review-graph
      - ../ref:/ref:ro
    environment:
      - HOME=/home/agent
      - OPENMONO_ENDPOINT=${OPENMONO_ENDPOINT:-http://llama-server:7474}
      - OPENMONO_WORKSPACE=/workspace
      - OPENMONO_HOST_WORKSPACE=${WORKSPACE:-.}
      - OPENMONO_API_KEY=${OPENMONO_API_KEY:-${LLAMA_API_KEY:-}}
      - OPENMONO_VISION_ENABLED=${OPENMONO_VISION_ENABLED:-0}
      - OPENMONO_CONTEXT_SIZE=${CTX_SIZE:-196608}
      # TUI in the foreground for the user, ACP server in the background on
      # 7475 so IDE clients and the VS Code extension can connect to the same
      # session. Disable with OPENMONO_ACP_ENABLED=0.
      - OPENMONO_ACP_ENABLED=${OPENMONO_ACP_ENABLED:-1}
    stdin_open: true
    tty: true
    working_dir: /workspace

networks:
  default:
    name: openmono-network
