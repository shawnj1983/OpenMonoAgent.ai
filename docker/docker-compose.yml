services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server
    profiles: ["full", "server"]
    # Upstream ghcr.io/ggml-org/llama.cpp:server* images ship llama-server and
    # its .so files together in /app/ but don't put /app on the linker search
    # path, so the binary errors out with "libllama-common.so.0: cannot open
    # shared object file". This propagates to the cuda/vulkan overrides via
    # docker compose's environment merge.
    environment:
      - LD_LIBRARY_PATH=/app
    # Base command — always replaced by docker/docker-compose.override.yml generated by install.sh.
    # MODEL_NAME and CTX_SIZE must be set (or use: openmono install).
    command: >
      --model /models/${MODEL_NAME:-}
      --alias ${MODEL_ALIAS:-model}
      --host 0.0.0.0
      --port 7474
      --ctx-size ${CTX_SIZE:-196608}
      --threads 8
      --threads-batch 8
      --batch-size 2048
      --ubatch-size 1024
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --parallel 1
      --jinja
      --reasoning off
      --metrics
      --api-key ${LLAMA_API_KEY:-}
    volumes:
      - ../models:/models:ro
    ports:
      - "${LLAMA_PORT:-7474}:7474"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Inference-side web services (optional, opt-in per service) ──────────────
  # Caddy is the single front door tunneled by frpc. It path-routes to llama
  # (pass-through), SearXNG (/search) and Scrapling (/scrape), enforcing the
  # shared LLAMA_API_KEY bearer on the two services that have no auth of their
  # own. It starts whenever either the `search` or `scraper` profile is active.
  caddy:
    image: caddy:2-alpine
    container_name: openmono-gateway
    profiles: ["full", "server", "search", "scraper"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "${GATEWAY_PORT:-47480}:8080"
    environment:
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
      - LLAMA_UPSTREAM=${LLAMA_UPSTREAM:-llama-server:7474}
      - SEARXNG_UPSTREAM=${SEARXNG_UPSTREAM:-searxng:8080}
      - SCRAPLING_UPSTREAM=${SCRAPLING_UPSTREAM:-scrapling:5000}
      - WEB_SEARCH_ENABLED=${WEB_SEARCH_ENABLED:-false}
      - WEB_SCRAPE_ENABLED=${WEB_SCRAPE_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  searxng:
    image: searxng/searxng:latest
    container_name: openmono-searxng
    profiles: ["full", "server", "search"]
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
      - SEARXNG_BASE_URL=http://localhost:47480
    restart: always

  scrapling:
    build:
      context: ./scrapling
    image: openmono-scrapling:latest
    container_name: openmono-scrapling
    profiles: ["full", "server", "scraper"]
    restart: always

  agent:
    image: openmono-agent:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: openmono-agent
    profiles: ["full", "agent"]
    volumes:
      - ${WORKSPACE:-.}:/workspace
      - ${HOME}/.openmono:/home/agent/.openmono
      - ${HOME}/.code-review-graph:/home/agent/.code-review-graph
      - ../ref:/ref:ro
    environment:
      - HOME=/home/agent
      - OPENMONO_ENDPOINT=${OPENMONO_ENDPOINT:-http://llama-server:7474}
      - OPENMONO_WORKSPACE=/workspace
      - OPENMONO_HOST_WORKSPACE=${WORKSPACE:-.}
      - OPENMONO_API_KEY=${OPENMONO_API_KEY:-${LLAMA_API_KEY:-}}
      - OPENMONO_VISION_ENABLED=${OPENMONO_VISION_ENABLED:-0}
      - OPENMONO_CONTEXT_SIZE=${CTX_SIZE:-196608}
      # TUI in the foreground for the user, ACP server in the background on
      # 7475 so IDE clients and the VS Code extension can connect to the same
      # session. Disable with OPENMONO_ACP_ENABLED=0.
      - OPENMONO_ACP_ENABLED=${OPENMONO_ACP_ENABLED:-1}
      # Web gateway: when set, WebSearch/WebFetch route through Caddy to
      # SearXNG/Scrapling; the per-service flags let the agent fall back to its
      # built-in DuckDuckGo/direct-fetch behaviour when a service isn't installed.
      - OPENMONO_WEB_GATEWAY=${OPENMONO_WEB_GATEWAY:-}
      - OPENMONO_WEB_SEARCH=${OPENMONO_WEB_SEARCH:-}
      - OPENMONO_WEB_SCRAPE=${OPENMONO_WEB_SCRAPE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    working_dir: /workspace

networks:
  default:
    name: openmono-network
